services:
  api:
    image: golang:1.26
    working_dir: /app
    volumes:
      - ./:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION: ${MONGO_COLLECTION}
      PORT: ${PORT:-5000}
      API_SECRET: ${API_SECRET:-dev-secret-change-me}
    command: sh -c "go mod download && go run ."
    ports:
      - "5000:5000"

volumes:
  go-mod-cache:
